<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Panelista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Super Sunkissed';
            src: url('Super Sunkissed.ttf');
        }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; }
        
        body { 
            font-family: 'Super Sunkissed', sans-serif; 
            text-align: center; color: white; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('back.jpg') no-repeat;
            background-size: cover;
            background-position: 95% center; 
            background-attachment: fixed;
            overflow: hidden;
            transition: background 0.6s ease-in-out;
            font-size: 18px;
        }

        #pantalla-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a url('back.jpg') no-repeat;
            background-size: cover;
            background-position: 95% center;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            z-index: 9999; padding-top: 8vh; 
        }

        .logo-portada { max-width: 220px; width: 65%; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(250,204,21,0.5)); animation: latido 2s infinite; }
        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .btn-entrar { 
            font-family: 'Super Sunkissed', sans-serif;
            background: rgba(225,29,72,0.9); color: white; border: 2px solid white; 
            padding: 6px 25px; font-size: 28px; cursor: pointer; 
            margin-top: -25px; 
            box-shadow: 0 5px 15px black; border-radius: 50px; text-transform: uppercase;
            position: relative;
            z-index: 10;
        }

        #menu-principal { display: none; padding: 20px; position: relative; z-index: 10; transition: opacity 0.5s ease; }
        #menu-principal.atenuado { opacity: 0.15; }

        .header-logo { max-width: 260px; width: 75%; margin: 45px auto 20px auto; display: block; animation: latido 2s infinite; }
        .tablero { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 400px; margin: 0 auto 20px auto; }
        
        button { 
            font-family: 'Super Sunkissed', sans-serif; 
            height: 90px; border-radius: 12px; border: 2px solid white; 
            color: white; font-size: 18px; text-transform: uppercase; cursor: pointer; 
            padding: 5px; line-height: 1.1;
        }
        
        .btn-rojo { background: #e11d48; } .btn-verde { background: #16a34a; } .btn-amarillo { background: #ca8a04; } .btn-azul { background: #2563eb; }

        .seccion-controles-abajo { 
            display: flex; justify-content: center; align-items: center; gap: 65px; margin-top: 25px; 
        }

        .seccion-dado { background: rgba(0,0,0,0.6); border: 2px dashed #ca8a04; border-radius: 15px; padding: 12px; }
        #boton-dado { background: white; color: black; width: 85px; height: 85px; border-radius: 12px; font-size: 45px; display: flex; justify-content: center; align-items: center; margin: 0 auto; cursor: pointer;}
        
        .btn-especial { 
            background: black; color: #facc15; border: 4px solid #facc15; 
            width: 105px; height: 105px; border-radius: 20px; 
            box-shadow: 0 0 15px rgba(250,204,21,0.5); 
            cursor: pointer; display: flex; align-items: center; justify-content: center; overflow: hidden; 
        }

        .star-icon { width: 80%; height: 80%; object-fit: contain; animation: girarEstrella 10s linear infinite; border-radius: 50%; }

        @keyframes girarEstrella { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .label-control { font-size: 22px; font-weight: bold; color: #facc15; margin-top: 10px; text-transform: uppercase; text-shadow: 2px 2px 4px black; }

        /* --- ESTILOS PLACA ROJA --- */
        #placa-roja {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #ff0000; z-index: 10000; flex-direction: column;
            justify-content: flex-start; align-items: center; padding: 20px; box-sizing: border-box;
            padding-top: 10vh;
        }

        .texto-ultimo-momento {
            font-family: 'Anton', sans-serif; font-size: 90px; color: white;
            text-transform: uppercase; text-shadow: 8px 8px 0px black;
            margin: 0; line-height: 0.8; letter-spacing: -3px;
            animation: parpadeoCronica 0.5s infinite;
        }

        @keyframes parpadeoCronica {
            0%, 49% { color: white; text-shadow: 8px 8px 0px black; }
            50%, 100% { color: #ff0000; text-shadow: 8px 8px 0px white; }
        }

        .pregunta-placa {
            font-family: 'Anton', sans-serif; font-size: 32px; color: white;
            margin-top: 50px; padding: 0 15px; text-shadow: 3px 3px 0px black;
            text-transform: uppercase; line-height: 1.1;
        }

        #respuesta-placa {
            font-family: 'Anton', sans-serif; font-size: 60px; color: #cfff04;
            margin-top: 20px; display: none; text-shadow: 4px 4px 0px black;
            text-transform: uppercase;
        }

        .btn-ver-respuesta {
            font-family: 'Super Sunkissed', sans-serif;
            background: #cfff04; color: black; border: 3px solid white;
            padding: 15px 30px; font-size: 24px; margin-top: 40px;
            border-radius: 15px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .btn-volver-placa-contenedor {
            margin-top: auto; margin-bottom: 40px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
            background: rgba(0, 0, 0, 0.6); border: 2px solid white;
            padding: 10px 20px; border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            animation: deslizarVertical 2s infinite ease-in-out;
        }

        /* --- RESTO DE ESTILOS --- */
        .pantalla-carta { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 5000; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 20px; }
        .logo-mazo { max-width: 150px; width: 40%; margin-bottom: 20px; filter: drop-shadow(0 0 8px black); }
        #visor { max-width: 98%; max-height: 46vh; border: 3px solid white; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        #visor-video { width: 92%; max-height: 69vh; border: 4px solid white; border-radius: 15px; background: black; object-fit: contain; }
        #mensaje-fin-videos { font-size: 28px; color: #facc15; text-shadow: 3px 3px 5px black; padding: 20px; line-height: 1.3; display: none; }
        
        .volver-pie-contenedor { margin-top: auto; margin-bottom: 40px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; background: rgba(0, 0, 0, 0.6); border: 2px solid white; padding: 10px 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); animation: deslizarVertical 2s infinite ease-in-out; }
        .volver-pie-texto { font-size: 18px; color: white; text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .flecha-volver-svg { width: 30px; height: 30px; fill: white; }
        
        @keyframes deslizarVertical { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
        
        #txt-pista { color:#facc15; font-size: 28px; margin-bottom: 20px; min-height: 60px; text-shadow: 2px 2px 5px black; padding: 0 20px; line-height: 1.2; }
        .controles-pistas { display: flex; gap: 10px; width: 90%; }
        .btn-pista { flex: 1; font-family: 'Super Sunkissed', sans-serif; height: 60px !important; border: 2px solid white; border-radius: 10px; color: white; font-size: 20px; cursor: pointer; }
        .btn-prev { background: #e11d48; display: none; }
        .btn-next { background: #2563eb; }
        #texto-frase { margin-top: 10px; font-size: 32px; text-shadow: 2px 2px 5px black; padding: 0 15px; line-height: 1.1; color: white; }
        .btn-audio-carta { font-family: 'Super Sunkissed', sans-serif; background:#facc15; color:black; width:90%; height:70px !important; margin-top:15px; border: 2px solid white; border-radius: 10px; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body id="cuerpo">

    <div id="pantalla-inicio">
        <img src="logo.png" class="logo-portada">
        <button class="btn-entrar" onclick="entrarAlJuego()">JUGAR</button>
    </div>

    <div id="placa-roja">
        <p class="texto-ultimo-momento">ULTIMO MOMENTO</p>
        <div class="pregunta-placa">¿QUI&Eacute;N FUE EL GANADOR DEL GRAN HERMANO CELEBRITY?</div>
        <div id="respuesta-placa">IANLUCA</div>
        <button id="btn-ver-placa" class="btn-ver-respuesta" onclick="mostrarRespuestaPlaca()">VER RESPUESTA</button>
        
        <div class="btn-volver-placa-contenedor" onclick="cerrarPlaca()">
            <div class="volver-pie-texto">volver al menú</div>
            <svg class="flecha-volver-svg" viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" transform="rotate(-90 12 12)"/>
            </svg>
        </div>
    </div>

    <div id="menu-principal">
        <img src="logo.png" class="header-logo">
        <div class="tablero">
            <button class="btn-rojo" onclick="abrirMazo('personajes')">¿QUI&Eacute;NES SON?</button>
            <button class="btn-verde" onclick="abrirMazo('quien_dijo')">QUI&Eacute;N DIJO QUI&Eacute;N DIJO...</button>
            <button class="btn-azul" onclick="sonarClick('alert')">TRES...</button>
            <button class="btn-amarillo" onclick="sonarClick('alert')">CHISMES</button>
        </div>
        <div class="seccion-controles-abajo">
            <div style="text-align: center;">
                <div class="seccion-dado"><div id="boton-dado" onclick="tirarDado()">🎲</div></div>
                <div class="label-control">DADO</div>
            </div>
            <div onclick="abrirVideoAleatorio()" style="text-align: center;">
                <button class="btn-especial">
                    <img src="star.jpg" alt="estrella giratoria" class="star-icon">
                </button>
                <div class="label-control">PANELISTA</div>
            </div>
        </div>
    </div>

    <div id="area-carta" class="pantalla-carta">
        <img src="logo.png" class="logo-mazo">
        <div id="mensaje-fin-videos">YA NO HAY MÁS CARTAS / PANELISTAS,<br>TIRÁ EL DADO NUEVAMENTE</div>
        <img id="visor" style="display:none;">
        <video id="visor-video" controls style="display:none;"></video>
        <div id="pistas-bloque" style="display:none; width: 90%; margin-top: 15px; flex-direction: column; align-items: center;">
            <div id="txt-pista"></div>
            <div class="controles-pistas">
                <button id="btn-pista-prev" class="btn-pista btn-prev" onclick="cambiarPista(-1)">ANTERIOR</button>
                <button class="btn-pista btn-next" onclick="cambiarPista(1)">SIGUIENTE</button>
            </div>
        </div>
        <button id="btn-audio" class="btn-audio-carta" style="display:none;" onclick="sonar()">🔊 ESCUCHAR</button>
        <div id="texto-frase"></div>
        <div class="volver-pie-contenedor" onclick="cerrar()">
            <div class="volver-pie-texto">volver al menú</div>
            <svg class="flecha-volver-svg" viewBox="0 0 24 24">
                <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" transform="rotate(-90 12 12)"/>
            </svg>
        </div>
    </div>

    <audio id="repro-frase"></audio>
    <audio id="repro-dado" src="sonidos/dado.mp3"></audio>
    <audio id="repro-rojo" src="sonidos/moria_01.mp3"></audio>
    <audio id="repro-click" src="sonidos/click.mp3"></audio>
    <audio id="repro-placa" src="sonidos/placa.mp3"></audio>

    <script>
        const datos = {
            personajes: [{ id: 'marley', img: 'personajes/marley.jpg', pistas: ["Su verdadero nombre es Alejandro.", "Empezó como columnista en un magazine.", "Viajó por todo el mundo.", "Tiene un hijo llamado Mirko."] }],
            quien_dijo: [
                // ALBINONI
                { id: 'albinoni_1', img: 'personajes/albinoni.jpg', audios: [{f:'sonidos/albinoni_01.mp3', t:'“¡Perdón... pero tengo las bolas llenas!”'}] },
                { id: 'albinoni_2', img: 'personajes/albinoni.jpg', audios: [{f:'sonidos/albinoni_02.mp3', t:'“Perdón... si alguno se ofendió porque después empiezan las ofensa”'}] },
                
                // MORIA CASÁN (Varias versiones)
                { id: 'moria_1', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_01.mp3', t:'“¿¡Quiénes son!? ¡¿Quiénes SON?!”'}] },
                { id: 'moria_2', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_02.mp3', t:'“¡25...25...!”'}] },
                { id: 'moria_3', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_03.mp3', t:'“¡Saca, saca, saca a esta ridícula!”'}] },
                { id: 'moria_4', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_04.mp3', t:'“Son dos doñas berretas de peluquería de barrio”'}] },
                { id: 'moria_5', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_05.mp3', t:'“Entonces no mientas Silvina Escupidero”'}] },
                { id: 'moria_6', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_06.mp3', t:'“Y tengo harem, mucho chongo como nunca”'}] },

                { id: 'dutra', img: 'personajes/dutra.jpg', audios: [{f:'sonidos/dutra_01.mp3', t:'“¡Toy tan sorpresa como todos ustedes!”'}] },
                { id: 'farinia', img: 'personajes/farinia.jpg', audios: [{f:'sonidos/farinia_01.mp3', t:'“¿Querían ficción? Yo les di ficción.”'}] },
                { id: 'feiman', img: 'personajes/feiman.jpg', audios: [{f:'sonidos/feiman_01.mp3', t:'“Y sos tan chicanero... pero mal.”'}] },
                { id: 'flordelav', img: 'personajes/flordelav.jpg', audios: [{f:'sonidos/flordelav_01.mp3', t:'“¡Soltame... que venga el choto de Ventura y que dé la cara!”'}] },
                { id: 'ivo', img: 'personajes/ivo.jpg', audios: [{f:'sonidos/ivo_01.mp3', t:'“Dos más dos son cuatro, la tierra es redonda, corta la bocha.”'}] },
                { id: 'jacobo', img: 'personajes/jacobo.jpg', audios: [{f:'sonidos/jacobo_01.mp3', t:'“Billetera... ¡mata galán!”'}] },
                { id: 'listorti', img: 'personajes/listorti.jpg', audios: [{f:'sonidos/listorti_01.mp3', t:'“¡Soooopaaaaaa!”'}] },
                { id: 'paleo', img: 'personajes/paleo.jpg', audios: [{f:'sonidos/paleo_01.mp3', t:'“Ay perdón porque escucho con... deleite.”'}] },
                { id: 'charlotte', img: 'personajes/charlotte.jpg', audios: [{f:'sonidos/charlotte_01.mp3', t:'“¡A mí me gusta el shampein!”'}] },
                { id: 'basile', img: 'personajes/basile.jpg', audios: [{f:'sonidos/basile_01.mp3', t:'“¡Qué boludo, mamita querida!”'}] },
                { id: 'bambino', img: 'personajes/bambino.jpg', audios: [{f:'sonidos/bambino_01.mp3', t:'“¡Es una tormenta de facha!”'}] },
                { id: 'francella', img: 'personajes/francella.jpg', audios: [{f:'sonidos/francella_01.mp3', t:'“¡A comeeerlaaa!”'}] },
                { id: 'riverito', img: 'personajes/riverito.jpg', audios: [{f:'sonidos/riverito_01.mp3', t:'“¡A cruzar los dedos!”'}] },
                { id: 'fort', img: 'personajes/fort.jpg', audios: [{f:'sonidos/fort_01.mp3', t:'“¡Mamá, cortaste toda la luz!”'}] },
                { id: 'barbieri', img: 'personajes/barbieri.jpg', audios: [{f:'sonidos/barbieri01.mp3', t:'“¿Me estás retando?”'}] },
                { id: 'pachano', img: 'personajes/pachano.jpg', audios: [{f:'sonidos/pachano01.mp3', t:'“¡Tinguitingui tinguitingui!”'}] },
                { id: 'fantino', img: 'personajes/fantino.jpg', audios: [{f:'sonidos/fantino_01.mp3', t:'“¡Para un poco Mose Paraaaa!!”'}] }
            ]
        };
        
        let videosDisponibles = ['panelistas/pane01.mp4', 'panelistas/pane02.mp4', 'panelistas/pane03.mp4'];
        let audiosVistosMazoVerde = {}; let actual = null; let audioActualIdx = 0; let pIdx = 0;
        let tirosRealizados = 0; let placaYaSalio = false;

        function sonarClick(callback) {
            const clk = document.getElementById('repro-click');
            clk.currentTime = 0; clk.play();
            if(callback === 'alert') alert('Próximamente');
        }

        function entrarAlJuego() {
            let e = document.documentElement;
            if (e.requestFullscreen) e.requestFullscreen();
            const capaInicio = document.getElementById('pantalla-inicio');
            if(capaInicio) capaInicio.remove();
            document.getElementById('menu-principal').style.display = 'block';
            document.body.style.background = "linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('back.jpg') no-repeat 95% center / cover fixed";
        }

        function abrirMazo(t) {
            if(t === 'personajes') {
                const audioMoria = document.getElementById('repro-rojo');
                audioMoria.currentTime = 0; audioMoria.play();
            } else { sonarClick(); }
            document.getElementById('menu-principal').classList.add('atenuado');
            document.getElementById('mensaje-fin-videos').style.display = 'none';
            document.getElementById('texto-frase').innerHTML = "";
            document.getElementById('visor-video').style.display = 'none';
            document.getElementById('visor').style.display = 'none';
            document.getElementById('btn-audio').style.display = 'none';
            document.getElementById('pistas-bloque').style.display = 'none';
            if (t === 'quien_dijo') { seleccionarAudioMazoVerde(); } 
            else {
                actual = datos[t][Math.floor(Math.random() * datos[t].length)];
                document.getElementById('visor').src = actual.img;
                document.getElementById('visor').style.display = 'block';
                pIdx = 0;
                document.getElementById('pistas-bloque').style.display = 'flex';
                document.getElementById('txt-pista').innerHTML = actual.pistas[pIdx];
                document.getElementById('btn-pista-prev').style.display = 'none';
                document.getElementById('area-carta').style.display = 'flex';
            }
        }

        function seleccionarAudioMazoVerde() {
            let opcionesDisponibles = [];
            datos.quien_dijo.forEach(pers => {
                pers.audios.forEach((audio, index) => {
                    if (!audiosVistosMazoVerde[pers.id] || !audiosVistosMazoVerde[pers.id].includes(index)) {
                        opcionesDisponibles.push({ personaje: pers, audioIdx: index });
                    }
                });
            });
            if (opcionesDisponibles.length === 0) { document.getElementById('mensaje-fin-videos').style.display = 'block'; } 
            else {
                const eleccion = opcionesDisponibles[Math.floor(Math.random() * opcionesDisponibles.length)];
                actual = eleccion.personaje; audioActualIdx = eleccion.audioIdx;
                if (!audiosVistosMazoVerde[actual.id]) audiosVistosMazoVerde[actual.id] = [];
                audiosVistosMazoVerde[actual.id].push(audioActualIdx);
                
                document.getElementById('visor').src = actual.img;
                document.getElementById('visor').style.display = 'block';
                document.getElementById('btn-audio').style.display = 'block';
                document.getElementById('texto-frase').innerHTML = actual.audios[audioActualIdx].t;
            }
            document.getElementById('area-carta').style.display = 'flex';
        }

        function tirarDado() {
            tirosRealizados++;
            const audioDado = document.getElementById('repro-dado');
            audioDado.currentTime = 0; audioDado.play();
            let c = 0;
            let i = setInterval(() => {
                document.getElementById('boton-dado').innerText = Math.floor(Math.random()*6)+1;
                if(c++ > 10) {
                    clearInterval(i);
                    if (!placaYaSalio && (Math.random() < 0.05 || tirosRealizados >= 20)) { activarPlacaRoja(); }
                }
            }, 80);
        }

        function activarPlacaRoja() {
            placaYaSalio = true;
            const audioPlaca = document.getElementById('repro-placa');
            audioPlaca.currentTime = 0; audioPlaca.play();
            document.getElementById('placa-roja').style.display = 'flex';
        }

        function mostrarRespuestaPlaca() {
            document.getElementById('respuesta-placa').style.display = 'block';
            document.getElementById('btn-ver-placa').style.display = 'none';
        }

        function cerrarPlaca() {
            document.getElementById('placa-roja').style.display = 'none';
            document.getElementById('respuesta-placa').style.display = 'none';
            document.getElementById('btn-ver-placa').style.display = 'block';
            document.getElementById('repro-placa').pause();
        }

        function cerrar() {
            sonarClick();
            document.getElementById('menu-principal').classList.remove('atenuado');
            document.getElementById('repro-frase').pause();
            const vp = document.getElementById('visor-video');
            vp.pause(); vp.src = "";
            document.getElementById('area-carta').style.display = 'none';
        }

        function cambiarPista(d) {
            sonarClick();
            let nuevaPista = pIdx + d;
            if(nuevaPista >= 0 && nuevaPista < actual.pistas.length) {
                pIdx = nuevaPista;
                document.getElementById('txt-pista').innerHTML = actual.pistas[pIdx];
                document.getElementById('btn-pista-prev').style.display = (pIdx > 0) ? 'block' : 'none';
            }
        }

        function abrirVideoAleatorio() {
            sonarClick();
            document.getElementById('menu-principal').classList.add('atenuado');
            const visorV = document.getElementById('visor-video');
            const msgFin = document.getElementById('mensaje-fin-videos');
            document.getElementById('texto-frase').innerHTML = ""; 
            document.getElementById('visor').style.display = 'none';
            document.getElementById('pistas-bloque').style.display = 'none';
            document.getElementById('btn-audio').style.display = 'none';
            if(videosDisponibles.length === 0) { visorV.style.display = 'none'; msgFin.style.display = 'block'; } 
            else {
                msgFin.style.display = 'none';
                const videoElegido = videosDisponibles.splice(Math.floor(Math.random() * videosDisponibles.length), 1)[0];
                visorV.src = videoElegido; visorV.style.display = 'block'; visorV.play();
            }
            document.getElementById('area-carta').style.display = 'flex';
        }

        function sonar() {
            const r = document.getElementById('repro-frase');
            r.src = actual.audios[audioActualIdx].f; r.play();
        }
    </script>
</body>
</html>
