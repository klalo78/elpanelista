<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Panelista</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; margin: 0; padding: 0; color: white; 
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('back.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden;
        }

        /* --- PANTALLA DE INICIO --- */
        #pantalla-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a url('back.jpg') no-repeat;
            background-size: cover;
            background-position: center 20%; /* SUBE LA IMAGEN DE FONDO UN POCO */
            display: flex; flex-direction: column; 
            justify-content: flex-start; 
            align-items: center;
            z-index: 9999;
            padding-top: 2vh; 
        }

        .logo-portada {
            max-width: 220px; width: 65%; margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.5));
            animation: latido 2s infinite; /* EFECTO MOVIMIENTO */
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-entrar {
            background-color: transparent; 
            color: #facc15; 
            border: 2px solid #facc15;
            padding: 8px 25px; 
            font-size: 14px; font-weight: 900;
            border-radius: 30px; cursor: pointer; text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .btn-entrar:active { background: #facc15; color: black; }

        /* --- MENÚ PRINCIPAL --- */
        #menu-principal { display: none; padding: 20px; }
        
        .header-logo { 
            max-width: 260px; 
            width: 75%; 
            margin: 5px auto 20px auto; 
            display: block; 
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
            animation: latido 2s infinite; /* AHORA EL LOGO PRINCIPAL TAMBIÉN SE MUEVE */
        }

        .tablero { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 380px; margin: 0 auto 20px auto; }
        button { font-family: 'Montserrat', sans-serif; height: 85px; border-radius: 12px; border: 2px solid white; font-weight: 900; color: white; font-size: 13px; text-transform: uppercase; cursor: pointer; }
        .btn-rojo { background: #e11d48; } .btn-verde { background: #16a34a; } .btn-amarillo { background: #ca8a04; } .btn-azul { background: #2563eb; }

        /* CONTROLES INFERIORES */
        .seccion-controles-abajo { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .seccion-dado { background: rgba(0,0,0,0.6); border: 2px dashed #ca8a04; border-radius: 15px; padding: 8px; }
        #boton-dado { background: white; color: black; width: 45px; height: 45px; border-radius: 8px; font-size: 22px; display: flex; justify-content: center; align-items: center; margin: 0 auto; cursor: pointer; }
        .btn-especial { background: black; color: #facc15; border: 3px solid #facc15; width: 65px; height: 65px; border-radius: 15px; font-size: 30px; box-shadow: 0 0 10px #facc15; }

        /* CARTAS */
        .pantalla-carta { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        #visor, #visor-video
