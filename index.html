<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Panelista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        @font-face { font-family: 'Super Sunkissed'; src: url('Super Sunkissed.ttf'); }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        body { font-family: 'Super Sunkissed', sans-serif; text-align: center; color: white; background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('back.jpg') no-repeat center/cover fixed; }

        /* --- PANTALLA DE INICIO --- */
        #pantalla-inicio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a url('back.jpg') no-repeat center/cover; display: flex; flex-direction: column; justify-content: flex-start; align-items: center; z-index: 9999; padding-top: 3vh; }
        .logo-portada { max-width: 220px; width: 65%; margin-bottom: 10px; animation: latido 2s infinite; }
        @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .btn-entrar { font-family: 'Super Sunkissed', sans-serif; background: #e11d48; color: white; border: 2px solid white; padding: 5px 20px; font-size: 28px; cursor: pointer; border-radius: 50px; text-transform: uppercase; box-shadow: 0 5px 15px black; }

        /* --- MENU PRINCIPAL --- */
        #menu-principal { display: none; padding: 20px; transition: opacity 0.5s ease; }
        #menu-principal.atenuado { opacity: 0.15; }
        .header-logo { max-width: 260px; width: 75%; margin: 40px auto 20px auto; display: block; }
        .tablero { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 400px; margin: 0 auto 20px auto; }
        button { font-family: 'Super Sunkissed', sans-serif; height: 90px; border-radius: 12px; border: 2px solid white; color: white; font-size: 18px; text-transform: uppercase; cursor: pointer; }
        .btn-rojo { background: #e11d48; } .btn-verde { background: #16a34a; } .btn-amarillo { background: #ca8a04; } .btn-azul { background: #2563eb; }

        /* --- CONTROLES --- */
        .seccion-controles-abajo { display: flex; justify-content: center; align-items: flex-end; gap: 65px; margin-top: 25px; }
        .seccion-dado { background: rgba(0,0,0,0.6); border: 2px dashed #ca8a04; border-radius: 15px; padding: 12px; }
        #boton-dado { background: white; color: black; width: 85px; height: 85px; border-radius: 12px; font-size: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer;}
        .btn-especial { background: black; border: 4px solid #facc15; width: 105px; height: 105px; border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .star-icon { width: 80%; border-radius: 50%; animation: girar 10s linear infinite; }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .label-control { font-size: 22px; font-weight: bold; color: #facc15; margin-top: 10px; text-shadow: 2px 2px 4px black; }

        /* --- PANTALLA CARTA --- */
        .pantalla-carta { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('back2.jpg') no-repeat center/cover fixed; z-index: 5000; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 20px; }
        .logo-mazo { max-width: 150px; width: 40%; margin-bottom: 20px; }
        
        #visor { max-width: 98%; max-height: 46vh; border: 3px solid white; border-radius: 10px; box-shadow: 0 10px 30px black; }
        
        /* ESTILO ESPECÍFICO FAMOSITOS (SIN BORDE BLANCO, CUADRADO, COMPLETO) */
        .img-famosito { 
            width: 75% !important; 
            aspect-ratio: 1/1 !important; 
            object-fit: contain !important; 
            border-radius: 0 !important; 
            border: none !important; 
            transform: rotate(-3deg); 
            box-shadow: 0 15px 35px black !important;
        }

        #visor-video { width: 92%; max-height: 60vh; border: 4px solid white; border-radius: 15px; background: black; object-fit: contain; }
        #texto-frase { margin-top: 15px; font-size: 28px; text-shadow: 2px 2px 5px black; padding: 0 15px; font-weight: bold; line-height: 1.1; }

        /* --- PLACA ROJA CRÓNICA --- */
        #pantalla-cronica { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f00; z-index: 10000; flex-direction: column; justify-content: center; align-items: center; color: white; border: 15px solid white; box-sizing: border-box; }
        .texto-cronica { font-family: 'Anton', sans-serif; font-size: 70px; text-transform: uppercase; line-height: 1; text-shadow: 5px 5px 0px black; border: 5px solid white; padding: 15px; animation: zoom-flash 2s infinite ease-in-out; }
        @keyframes zoom-flash { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
        .pregunta-placa { font-size: 32px; margin-top: 30px; font-weight: bold; text-shadow: 2px 2px 4px black; padding: 0 20px; }
        .respuesta-placa { font-size: 50px; background: white; color: #f00; padding: 10px 30px; margin-top: 20px; font-weight: bold; display: none; border-radius: 10px; }
        .btn-revelar-placa { font-family: 'Super Sunkissed'; background: #000; color: #fff; border: 3px solid #fff; padding: 10px 30px; font-size: 22px; margin-top: 25px; cursor: pointer; border-radius: 50px; }

        /* BOTÓN VOLVER */
        .volver-pie-contenedor { margin-top: auto; margin-bottom: 12vh; cursor: pointer; background: rgba(0, 0, 0, 0.7); border: 2px solid white; padding: 8px 45px; border-radius: 25px; animation: deslizar 2s infinite ease-in-out; }
        .volver-pie-texto { font-size: 22px; color: white; text-transform: uppercase; font-weight: bold; }
        @keyframes deslizar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }

        /* TIMER REDONDO */
        #contenedor-timer { 
            display: none; 
            width: 100px; 
            height: 100px; 
            border-radius: 50% !important; 
            border: 6px double #333; 
            background: #fdf5e6; 
            color: #222; 
            justify-content: center; 
            align-items: center; 
            font-family: 'Anton', sans-serif; 
            font-size: 60px; 
            margin: 0 auto 15px auto; 
            transition: all 0.3s;
        }
        #contenedor-timer.final { color: #e11d48; border-color: #e11d48; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <img src="logo.png" class="logo-portada">
        <button class="btn-entrar" onclick="entrarAlJuego()">JUGAR</button>
    </div>

    <div id="pantalla-cronica">
        <div class="texto-cronica">Último momento</div>
        <div id="texto-pregunta-placa" class="pregunta-placa"></div>
        <div id="texto-respuesta-placa" class="respuesta-placa"></div>
        <button id="btn-revelar-placa" class="btn-revelar-placa" onclick="revelarRespuestaPlaca()">VER RESPUESTA</button>
        <div id="btn-volver-placa" class="volver-pie-contenedor" style="display:none; margin-top: 30px;" onclick="cerrarCronica()">
            <div class="volver-pie-texto">VOLVER</div>
        </div>
    </div>

    <div id="menu-principal">
        <img src="logo.png" class="header-logo">
        <div class="tablero">
            <button class="btn-rojo" onclick="abrirMazo('personajes')">¿QUI&Eacute;NES SON?</button>
            <button class="btn-verde" onclick="abrirMazo('quien_dijo')">QUI&Eacute;N DIJO...</button>
            <button class="btn-azul" onclick="abrirMazo('vf')">VERDADERO O FALSO</button>
            <button class="btn-amarillo" onclick="abrirMazo('famositos')">FAMOSITOS</button>
        </div>
        <div class="seccion-controles-abajo">
            <div style="text-align: center;"><div class="seccion-dado"><div id="boton-dado" onclick="tirarDado()">🎲</div></div><div class="label-control">DADO</div></div>
            <div onclick="abrirVideoAleatorio()" style="text-align: center;"><button class="btn-especial"><img src="star.jpg" class="star-icon"></button><div class="label-control">PANELISTA</div></div>
        </div>
    </div>

    <div id="area-carta" class="pantalla-carta">
        <img src="logo.png" class="logo-mazo">
        <div id="contenedor-timer">10</div>
        <div id="mensaje-fin-videos" style="display:none; font-size:28px; color:gold;">YA NO HAY MÁS...</div>
        
        <img id="visor" style="display:none;">
        <video id="visor-video" controls style="display:none; width:92%; border-radius:15px;"></video>
        
        <div id="texto-frase"></div>

        <div id="bloque-famositos" style="display:none; flex-direction:column; align-items:center; width:90%; margin-top:15px;">
            <button id="btn-revelar-famosito" style="background:#ca8a04; border:3px solid white; height:65px; width:100%; font-size:22px; color:white; border-radius:15px;" onclick="revelarFamosito()">VER RESPUESTA</button>
            <div id="txt-resp-famosito" style="margin-top:15px; font-size:32px; color:#facc15; font-weight:bold; display:none; text-shadow: 2px 2px 4px black;"></div>
        </div>

        <div id="mazo-vf" style="display:none; width:90%; flex-direction:column; gap:15px;">
            <button id="btn-v" style="height:70px; background:#16a34a; border:3px solid white; border-radius:15px; font-size:24px; color:white;" onclick="chequearVF(true)">VERDADERO</button>
            <button id="btn-f" style="height:70px; background:#e11d48; border:3px solid white; border-radius:15px; font-size:24px; color:white;" onclick="chequearVF(false)">FALSO</button>
            <div id="resp-vf-texto" style="color:#facc15; font-size:24px; margin-top:10px; font-weight:bold;"></div>
        </div>

        <div id="pistas-bloque" style="display:none; flex-direction:column; align-items:center;">
            <div id="txt-pista" style="color:#facc15; font-size:28px; margin-bottom:20px; text-shadow:2px 2px 5px black;"></div>
            <div style="display:flex; gap:15px; width:90%; justify-content:center;">
                <button id="btn-pista-prev" style="background:#e11d48; font-family:'Super Sunkissed'; height:65px; border:2px solid white; border-radius:12px; color:white; font-size:22px; min-width:140px;" onclick="cambiarPista(-1)">ANTERIOR</button>
                <button id="btn-pista-next" style="background:#2563eb; font-family:'Super Sunkissed'; height:65px; border:2px solid white; border-radius:12px; color:white; font-size:22px; min-width:140px;" onclick="cambiarPista(1)">SIGUIENTE</button>
            </div>
        </div>

        <button id="btn-audio" style="display:none; font-family:'Super Sunkissed'; background:#facc15; color:black; width:90%; height:75px; margin-top:20px; border:3px solid white; border-radius:15px; font-size:24px;" onclick="sonar()">🔊 ESCUCHAR AUDIO</button>

        <div class="volver-pie-contenedor" onclick="cerrar()">
            <div class="volver-pie-texto">VOLVER</div>
        </div>
    </div>

    <audio id="repro-frase"></audio>
    <audio id="repro-dado" src="sonidos/dado.mp3"></audio>
    <audio id="repro-rojo" src="sonidos/moria_01.mp3"></audio>
    <audio id="repro-placa" src="sonidos/placa.mp3"></audio>
    <audio id="repro-click" src="sonidos/click.mp3"></audio>
    <audio id="repro-bien" src="sonidos/bien.mp3"></audio>
    <audio id="repro-mal" src="sonidos/mal.mp3"></audio>
    <audio id="repro-tictac" src="sonidos/tictac.mp3" loop></audio>

    <script>
        const datos = {
            personajes: [{ id: 'marley', img: 'personajes/marley.jpg', pistas: ["Su verdadero nombre es Alejandro.", "Empezó como columnista en un magazine.", "Viajó por todo el mundo.", "Tiene un hijo llamado Mirko."] }],
            quien_dijo: [
                // (Aquí van tus 39 audios del mazo verde)
            ],
            vf: [
                { t: 'Marcela Tauro fue abducida por un OVNI', r: true, detalle: 'Aseguró que fue en Ranelagh.' },
                { t: 'El perro de Susana Jiménez se llamaba Bruno', r: false, detalle: 'Se llamaba Jazmín.' },
                { t: 'En el primer almuerzo de Mirtha estuvo Daniel Tinayre', r: true, detalle: 'Debutó el 3 de junio de 1968.' }
            ],
            famositos: [
                { id: 'rago', img: 'polaroid/ragopolaroid.jpg', r: 'PABLO RAGO' },
                { id: 'angel', img: 'polaroid/angelpolaroid.jpg', r: 'ANGEL DE BRITO' },
                { id: 'china', img: 'polaroid/chinasuarezpolaroid.jpg', r: 'LA CHINA SUÁREZ' },
                { id: 'delboca', img: 'polaroid/delbocapolaroid.jpg', r: 'ANDREA DEL BOCA' },
                { id: 'guido', img: 'polaroid/guidopolaroid.jpg', r: 'GUIDO KACZKA' },
                { id: 'josema', img: 'polaroid/josemapolaroid.jpg', r: 'JOSÉ MARÍA LISTORTI' },
                { id: 'lopilato', img: 'polaroid/lopilatopolaroid.jpg', r: 'LUISANA LOPILATO' },
                { id: 'luciano', img: 'polaroid/lucianocastropolaroid.jpg', r: 'LUCIANO CASTRO' },
                { id: 'sbaraglia', img: 'polaroid/sbaragliapolaroid.jpg', r: 'LEONARDO SBARAGLIA' },
                { id: 'suar', img: 'polaroid/suarpolaroid.jpg', r: 'ADRIÁN SUAR' },
                { id: 'tini', img: 'polaroid/tinipolaroid.jpg', r: 'TINI STOESSEL' },
                { id: 'benjamin', img: 'polaroid/venjaminpolaroid.jpg', r: 'BENJAMÍN VICUÑA' }
            ],
            placasEspeciales: [
                { id: 'placa01', pregunta: '¿Quién fue el ganador de MasterChef Celebrity?', respuesta: 'IAN LUCA' }
            ]
        };

        let contadorDados = 0; let tiroEventoPlaca = Math.floor(Math.random() * 15) + 1;
        let mazoVerde = []; let mazoAzul = []; let mazoAmarillo = [];
        let videosDisponibles = ['panelistas/pane01.mp4', 'panelistas/pane02.mp4', 'panelistas/pane03.mp4'];
        let actual = null; let actualPlaca = null; let pIdx = 0; let respondidoVF = false; let timerSegundos = 10; let intervaloTimer = null;
        let activeDeckType = null;

        function entrarAlJuego() {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) { docElm.requestFullscreen(); } 
            else if (docElm.webkitRequestFullscreen) { docElm.webkitRequestFullscreen(); }
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';
        }

        function abrirMazo(t) {
            pararTimer(); sonarClick(); activeDeckType = t;
            document.getElementById('menu-principal').classList.add('atenuado');
            document.getElementById('area-carta').style.display = 'flex';
            const v = document.getElementById('visor');
            v.style.display = 'none'; v.className = "";
            document.getElementById('visor-video').style.display = 'none';
            document.getElementById('mazo-vf').style.display = 'none';
            document.getElementById('bloque-famositos').style.display = 'none';
            document.getElementById('pistas-bloque').style.display = 'none';
            document.getElementById('btn-audio').style.display = 'none';
            document.getElementById('contenedor-timer').style.display = 'none';
            document.getElementById('texto-frase').style.display = 'block';
            document.getElementById('texto-frase').innerHTML = "";

            if (t === 'personajes') {
                document.getElementById('repro-rojo').play();
                actual = datos.personajes[0];
                v.src = actual.img; v.style.display = 'block'; v.style.borderRadius = "15px";
                pIdx = 0; document.getElementById('pistas-bloque').style.display = 'flex';
                document.getElementById('txt-pista').innerHTML = actual.pistas[pIdx];
                actualizarBotonesPistas();
            } else if (t === 'vf') {
                document.getElementById('resp-vf-texto').innerHTML = ""; 
                document.getElementById('btn-v').style.opacity = "1"; document.getElementById('btn-f').style.opacity = "1";
                if (mazoAzul.length === 0) mazoAzul = [...datos.vf].sort(() => Math.random() - 0.5);
                actual = mazoAzul.pop();
                document.getElementById('texto-frase').innerHTML = actual.t;
                document.getElementById('mazo-vf').style.display = 'flex';
                respondidoVF = false; iniciarTimer();
            } else if (t === 'quien_dijo') {
                if (mazoVerde.length === 0) mazoVerde = [...datos.quien_dijo].sort(() => Math.random() - 0.5);
                actual = mazoVerde.pop();
                v.src = actual.img; v.style.display = 'block'; v.style.borderRadius = "15px";
                document.getElementById('btn-audio').style.display = 'block';
                document.getElementById('texto-frase').innerHTML = actual.audios[0].t;
            } else if (t === 'famositos') {
                if (mazoAmarillo.length === 0) mazoAmarillo = [...datos.famositos].sort(() => Math.random() - 0.5);
                actual = mazoAmarillo.pop();
                v.src = actual.img; v.style.display = 'block'; v.className = "img-famosito";
                document.getElementById('bloque-famositos').style.display = 'flex';
                document.getElementById('btn-revelar-famosito').style.display = 'block';
                document.getElementById('txt-resp-famosito').style.display = 'none';
                document.getElementById('texto-frase').innerHTML = "¿QUI&Eacute;N ES ESTE FAMOSITO?";
                iniciarTimer();
            }
        }

        function revelarFamosito() { pararTimer(); sonarClick(); document.getElementById('btn-revelar-famosito').style.display = 'none'; document.getElementById('txt-resp-famosito').innerHTML = actual.r; document.getElementById('txt-resp-famosito').style.display = 'block'; }
        function tirarDado() { contadorDados++; if (contadorDados === tiroEventoPlaca) { lanzarPlacaEspecial(); contadorDados = 0; tiroEventoPlaca = Math.floor(Math.random() * 15) + 1; } else { ejecutarAnimacionDado(); } }
        function lanzarPlacaEspecial() { actualPlaca = datos.placasEspeciales[0]; document.getElementById('texto-pregunta-placa').innerHTML = actualPlaca.pregunta; document.getElementById('texto-respuesta-placa').innerHTML = actualPlaca.respuesta; document.getElementById('texto-respuesta-placa').style.display = 'none'; document.getElementById('btn-revelar-placa').style.display = 'block'; document.getElementById('btn-volver-placa').style.display = 'none'; document.getElementById('pantalla-cronica').style.display = 'flex'; document.getElementById('repro-placa').play(); }
        function revelarRespuestaPlaca() { sonarClick(); document.getElementById('btn-revelar-placa').style.display = 'none'; document.getElementById('texto-respuesta-placa').style.display = 'block'; document.getElementById('btn-volver-placa').style.display = 'flex'; }
        function ejecutarAnimacionDado() { const s = document.getElementById('repro-dado'); s.currentTime = 0; s.play(); let c = 0; let i = setInterval(() => { document.getElementById('boton-dado').innerText = Math.floor(Math.random()*6)+1; if(c++ > 10) clearInterval(i); }, 80); }
        function cerrarCronica() { document.getElementById('pantalla-cronica').style.display = 'none'; document.getElementById('repro-placa').pause(); document.getElementById('repro-placa').currentTime = 0; ejecutarAnimacionDado(); }

        function abrirVideoAleatorio() {
            sonarClick(); document.getElementById('menu-principal').classList.add('atenuado');
            document.getElementById('area-carta').style.display = 'flex';
            document.getElementById('visor').style.display = 'none';
            document.getElementById('mazo-vf').style.display = 'none';
            document.getElementById('pistas-bloque').style.display = 'none';
            document.getElementById('btn-audio').style.display = 'none';
            document.getElementById('bloque-famositos').style.display = 'none';
            document.getElementById('texto-frase').style.display = 'none';
            document.getElementById('contenedor-timer').style.display = 'none';
            const v = document.getElementById('visor-video');
            if(videosDisponibles.length === 0) {
                document.getElementById('mensaje-fin-videos').style.display = 'block';
                v.style.display = 'none';
            } else {
                document.getElementById('mensaje-fin-videos').style.display = 'none';
                const ve = videosDisponibles.splice(Math.floor(Math.random()*videosDisponibles.length), 1)[0];
                v.src = ve; v.style.display = 'block'; v.play();
            }
        }

        function actualizarBotonesPistas() { const btnPrev = document.getElementById('btn-pista-prev'); const btnNext = document.getElementById('btn-pista-next'); btnPrev.style.display = (pIdx > 0) ? 'block' : 'none'; btnNext.style.display = (pIdx < actual.pistas.length - 1) ? 'block' : 'none'; }
        function cambiarPista(d) { pIdx += d; document.getElementById('txt-pista').innerHTML = actual.pistas[pIdx]; actualizarBotonesPistas(); sonarClick(); }
        function iniciarTimer() { timerSegundos = 10; const cajaTimer = document.getElementById('contenedor-timer'); cajaTimer.innerText = timerSegundos; cajaTimer.style.display = 'flex'; cajaTimer.classList.remove('final'); document.getElementById('repro-tictac').play(); intervaloTimer = setInterval(() => { timerSegundos--; cajaTimer.innerText = timerSegundos; if (timerSegundos <= 3) { cajaTimer.classList.add('final'); } if(timerSegundos <= 0) { pararTimer(); if (activeDeckType === 'famositos') { document.getElementById('repro-mal').play(); } if (activeDeckType === 'vf' && !respondidoVF) chequearVF('tiempo'); } }, 1000); }
        function pararTimer() { clearInterval(intervaloTimer); document.getElementById('repro-tictac').pause(); }
        function chequearVF(eleccion) { if(respondidoVF) return; respondidoVF = true; pararTimer(); if(eleccion === actual.r) document.getElementById('repro-bien').play(); else document.getElementById('repro-mal').play(); const res = actual.r ? '<span style="color:#16a34a; font-size:32px; display:block; margin-bottom:5px;">VERDADERO</span>' : '<span style="color:#e11d48; font-size:32px; display:block; margin-bottom:5px;">FALSO</span>'; document.getElementById('resp-vf-texto').innerHTML = res + actual.detalle; document.getElementById('btn-v').style.opacity = (eleccion === true) ? "1" : "0.3"; document.getElementById('btn-f').style.opacity = (eleccion === false) ? "1" : "0.3"; }
        function cerrar() { pararTimer(); activeDeckType = null; document.getElementById('menu-principal').classList.remove('atenuado'); document.getElementById('area-carta').style.display = 'none'; document.getElementById('visor-video').pause(); }
        function sonarClick() { document.getElementById('repro-click').play(); }
        function sonar() { document.getElementById('repro-frase').src = actual.audios[0].f; document.getElementById('repro-frase').play(); }
    </script>
</body>
</html>
