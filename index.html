<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Panelista</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; margin: 0; padding: 0; color: white; 
            background-color: #1a1a1a;
            /* Fondo inicial */
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('back.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden;
            transition: background-image 0.5s ease-in-out; /* Transición suave al cambiar fondo */
        }

        /* Clase que aplicaremos por JavaScript para cambiar al fondo 2 */
        body.fondo-mazo {
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('back2.jpg');
        }

        /* --- PANTALLA DE INICIO --- */
        #pantalla-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a url('back.jpg') no-repeat;
            background-size: cover;
            background-position: center 20%; 
            display: flex; flex-direction: column; 
            justify-content: flex-start; 
            align-items: center;
            z-index: 9999;
            padding-top: 8vh; 
        }

        .logo-portada {
            max-width: 220px; width: 65%; margin-bottom: 30px;
            filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.5));
            animation: latido 2s infinite;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-entrar {
            background-color: rgba(225, 29, 72, 0.7); 
            color: white; border: 2px solid white;
            padding: 12px 35px; font-size: 18px; font-weight: 900;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            transition: 0.3s;
        }

        /* --- MENÚ PRINCIPAL --- */
        #menu-principal { display: none; padding: 20px; }
        
        .header-logo { 
            max-width: 260px; width: 75%; margin: 5px auto 20px auto; 
            display: block; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
            animation: latido 2s infinite; 
        }

        .tablero { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 380px; margin: 0 auto 20px auto; }
        button { font-family: 'Montserrat', sans-serif; height: 85px; border-radius: 12px; border: 2px solid white; font-weight: 900; color: white; font-size: 13px; text-transform: uppercase; cursor: pointer; }
        .btn-rojo { background: #e11d48; } .btn-verde { background: #16a34a; } .btn-amarillo { background: #ca8a04; } .btn-azul { background: #2563eb; }

        .seccion-controles-abajo { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .seccion-dado { background: rgba(0,0,0,0.6); border: 2px dashed #ca8a04; border-radius: 15px; padding: 8px; }
        #boton-dado { background: white; color: black; width: 45px; height: 45px; border-radius: 8px; font-size: 22px; display: flex; justify-content: center; align-items: center; margin: 0 auto; cursor: pointer; }
        .btn-especial { background: black; color: #facc15; border: 3px solid #facc15; width: 65px; height: 65px; border-radius: 15px; font-size: 30px; box-shadow: 0 0 10px #facc15; }

        /* CARTAS */
        .pantalla-carta { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; justify-content: center; align-items: center; }
        #visor, #visor-video { max-width: 85%; max-height: 45vh; border: 3px solid white; border-radius: 10px; }
        .btn-cerrar { position: absolute; top: 15px; right: 15px; background: #e11d48; color: white; border: 2px solid white; border-radius: 50%; width: 45px; height: 45px; font-weight: bold; }
    </style>
</head>
<body id="cuerpo-web">

    <div id="pantalla-inicio">
        <img src="logo.png" alt="Logo" class="logo-portada">
        <button class="btn-entrar" onclick="entrarAlJuego()">Entrar</button>
    </div>

    <div id="menu-principal">
        <img src="logo.png" class="header-logo">
        <div class="tablero">
            <button class="btn-rojo" onclick="abrirMazo('personajes')">ADIVIN&Aacute;</button>
            <button class="btn-verde" onclick="abrirMazo('quien_dijo')">QUI&Eacute;N DIJO</button>
            <button class="btn-azul" onclick="alert('Pr&oacute;ximamente')">TRES...</button>
            <button class="btn-amarillo" onclick="alert('Pr&oacute;ximamente')">CHISMES</button>
        </div>
        <div class="seccion-controles-abajo">
            <div class="seccion-dado"><div id="boton-dado" onclick="tirarDado()">🎲</div></div>
            <div onclick="abrirVideoAleatorio()"><button class="btn-especial">★</button></div>
        </div>
    </div>

    <div id="area-carta" class="pantalla-carta">
        <button class="btn-cerrar" onclick="cerrar()">X</button>
        <img id="visor" style="display:none;">
        <video id="visor-video" controls style="display:none;"></video>
        <div id="pistas-bloque" style="margin-top:20px; width:85%; display:none;">
            <div id="txt-pista" style="color:#facc15; font-size:18px; font-weight:bold; margin-bottom:15px; min-height:50px;"></div>
            <button style="width:100%; background:#2563eb; height:50px !important;" onclick="cambiarPista(1)">SIGUIENTE</button>
        </div>
        <button id="btn-audio" style="display:none; background:#facc15; color:black; width:80%; height:60px !important; margin-top:15px;" onclick="sonar()">🔊 ESCUCHAR</button>
        <div id="texto-frase" style="margin-top:10px; font-style:italic; font-size:20px;"></div>
    </div>

    <audio id="repro-frase"></audio>
    <audio id="sonido-dado" src="dado.mp3"></audio>

    <script>
        const datos = {
            personajes: [
                {
                    img: 'personajes/p_01marley.jpg', 
                    pistas: [
                        "Pista 1: Su verdadero nombre es Alejandro.",
                        "Pista 2: Empez&oacute; como columnista en un magazine.",
                        "Pista 3: Viaj&oacute; por todo el mundo.",
                        "Pista 4: Tiene un hijo llamado Mirko."
                    ]
                }
            ],
            quien_dijo: [
                {
                    img: 'personajes/p_06fort.jpg', 
                    audios: [{f:'sonidos/p_06fort_01.mp3', t:'“¡Mam&aacute;, cortaste toda la luz!”'}]
                }
            ]
        };
        let vids = ['panelistas/pane01.mp4'];
        let actual = null; let pIdx = 0;

        function entrarAlJuego() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';
            let e = document.documentElement;
            if (e.requestFullscreen) e.requestFullscreen();
            else if (e.webkitRequestFullscreen) e.webkitRequestFullscreen();
        }

        function abrirMazo(t) {
            // CAMBIO AL FONDO 2
            document.getElementById('cuerpo-web').classList.add('fondo-mazo');

            actual = datos[t][Math.floor(Math.random() * datos[t].length)];
            document.getElementById('visor').src = actual.img;
            document.getElementById('visor').style.display = 'block';
            document.getElementById('visor-video').style.display = 'none';
            document.getElementById('texto-frase').innerHTML = "";
            
            if(t === 'quien_dijo') {
                document.getElementById('pistas-bloque').style.display = 'none';
                document.getElementById('btn-audio').style.display = 'block';
            } else {
                pIdx = 0;
                document.getElementById('pistas-bloque').style.display = 'block';
                document.getElementById('btn-audio').style.display = 'none';
                document.getElementById('txt-pista').innerHTML = actual.pistas[pIdx];
            }
            document.getElementById('area-carta').style.display = 'flex';
        }

        function sonar() {
            const r = document.getElementById('repro-frase');
            r.src = actual.audios[0].f;
            document.getElementById('texto-frase').innerHTML = actual.audios[0].t;
            r.play();
        }

        function cambiarPista(d) {
            if(pIdx < actual.pistas.length - 1) {
                pIdx += d;
                document.getElementById('txt-pista').innerHTML = actual.pistas[pIdx];
            }
        }

        function abrirVideoAleatorio() {
            if(vids.length === 0) return alert("No hay más videos");
            
            // CAMBIO AL FONDO 2
            document.getElementById('cuerpo-web').classList.add('fondo-mazo');

            const vp = document.getElementById('visor-video');
            vp.src = vids[0];
            document.getElementById('visor').style.display = 'none';
            document.getElementById('visor-video').style.display = 'block';
            document.getElementById('area-carta').style.display = 'flex';
            vp.play();
        }

        function tirarDado() {
            const d = document.getElementById('boton-dado');
            const s = document.getElementById('sonido-dado');
            if(s) s.play().catch(()=>{});
            let c = 0;
            let i = setInterval(() => {
                d.innerText = Math.floor(Math.random()*6)+1;
                if(c++ > 10) clearInterval(i);
            }, 80);
        }

        function cerrar() {
            // VOLVER AL FONDO ORIGINAL
            document.getElementById('cuerpo-web').classList.remove('fondo-mazo');

            document.getElementById('repro-frase').pause();
            document.getElementById('visor-video').pause();
            document.getElementById('area-carta').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';
        }
    </script>
</body>
</html>
