<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Panelista</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; 
            margin: 0; padding: 20px; color: white; 
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('back.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden;
        }

        /* --- PANTALLA DE INICIO (PORTADA) --- */
        #pantalla-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a url('back.jpg') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .logo-portada {
            max-width: 300px; width: 85%; margin-bottom: 40px;
            /* Mantenemos el filtro para .png también */
            filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.6));
            animation: latido 2s infinite;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-entrar {
            background-color: #facc15; color: black; border: 4px solid white;
            padding: 20px 50px; font-size: 22px; font-weight: 900;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* --- MENÚ PRINCIPAL (OCULTO AL INICIO) --- */
        #menu-principal { display: none; }

        .header-logo {
            max-width: 220px; width: 65%; height: auto;
            margin: 10px auto 25px auto; display: block;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5));
        }

        .tablero { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 0 auto 20px auto; }
        
        button { 
            font-family: 'Montserrat', sans-serif; height: 95px; border-radius: 12px; border: 2px solid white; 
            font-weight: 900; color: white; font-size: 14px; cursor: pointer; text-transform: uppercase; transition: 0.3s ease; 
        }

        .btn-rojo { background-color: #e11d48; }
        .btn-verde { background-color: #16a34a; }
        .btn-amarillo { background-color: #ca8a04; }
        .btn-azul { background-color: #2563eb; }

        /* --- CONTROLES ABAJO (DESTACADOS) --- */
        .seccion-controles-abajo { display: flex; justify-content: center; align-items: center; gap: 30px; margin-top: 10px; }
        
        /* Destacado sutil del Dado */
        .seccion-dado { 
            background: rgba(0, 0, 0, 0.6); 
            border: 3px dashed #ca8a04; /* Borde más grueso y color más intenso */
            border-radius: 20px; 
            padding: 10px; 
            box-shadow: 0 0 10px rgba(202, 138, 4, 0.3); /* Resplandor suave */
        }
        #boton-dado { 
            background-color: white; color: black; 
            width: 60px; height: 60px; 
            border-radius: 12px; font-size: 30px; 
            display: flex; justify-content: center; align-items: center; 
            margin: 5px auto; cursor: pointer; user-select: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3); /* Sombra al dado blanco */
        }

        /* Destacado sutil del Panelista */
        .btn-especial {
            background-color: #000000; 
            color: #facc15; 
            border: 4px solid #facc15; /* Borde más grueso */
            font-size: 40px !important; display: flex; justify-content: center; align-items: center;
            width: 80px; height: 80px; margin: 10px auto; border-radius: 15px;
            /* Resplandor dorado constante pero suave */
            box-shadow: 0 0 15px rgba(250, 204, 21, 0.5); 
            transition: 0.3s ease;
        }
        .btn-especial:active {
            transform: scale(0.95);
            box-shadow: 0 0 5px rgba(250, 204, 21, 0.8);
        }


        /* --- PANTALLA DE CARTA / VIDEO --- */
        .pantalla-carta { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 500; flex-direction: column; justify-content: center; align-items: center; 
        }
        
        #visor, #visor-video { max-width: 85%; max-height: 48vh; border: 4px solid white; border-radius: 15px; background: #333; }

        .contenedor-inferior { margin-top: 20px; width: 90%; max-width: 380px; }
        
        #texto-frase-escrita { 
            color: white; font-size: 22px; margin-top: 15px; font-style: italic; min-height: 50px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
        }

        .btn-audio { 
            background: #facc15; color: black; width: 100%; height: 65px !important; 
            font-size: 18px !important; border: 3px solid white; display: none; 
        }

        #seccion-pistas { 
            background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.3); display: none; 
        }

        #texto-pista { color: #facc15; font-size: 20px; margin-bottom: 20px; min-height: 60px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        
        .controles-pistas { display: flex; justify-content: center; gap: 10px; height: 50px; }
        .btn-nav-pista { background: #2563eb; border: 2px solid white; font-size: 13px !important; height: 50px !important; transition: all 0.4s ease; }
        
        #btn-atras { flex: 0; width: 0; padding: 0; margin: 0; opacity: 0; border: none; pointer-events: none; white-space: nowrap; }
        #btn-atras.visible { flex: 1; opacity: 1; padding: 0 10px; border: 2px solid white; pointer-events: auto; }
        #btn-adelante { flex: 2; }
        #btn-adelante.compartido { flex: 1; }
        
        .btn-cerrar { position: absolute; top: 20px; right: 20px; background: #e11d48; color: white; border: 2px solid white; border-radius: 50%; width: 50px; height: 50px; font-weight: bold; font-size: 22px; z-index: 600; }
        
        .girando { animation: vibrar 0.1s infinite; }
        @keyframes vibrar { 0% { transform: rotate(0deg); } 50% { transform: rotate(5deg); } 100% { transform: rotate(-5deg); } }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <img src="logo.png" alt="Logo El Panelista" class="logo-portada">
        <button class="btn-entrar" onclick="entrarAlJuego()">ENTRAR AL JUEGO</button>
    </div>

    <div id="menu-principal">
        <img src="logo.png" alt="Logo" class="header-logo">
        
        <div class="tablero">

        <div class="seccion-controles-abajo">

            <div>
                <button class="btn-especial" onclick="abrirVideoAleatorio()">★</button>
                <div style="font-size: 10px; font-weight: bold; color: #facc15;">PANELISTA</div>
            </div>
        </div>
    </div>

    <div id="area-carta" class="pantalla-carta">
        <button class="btn-cerrar" onclick="detenerYcerrar()">X</button>
        
        <img id="visor" src="" style="display:none;">
        <video id="visor-video" controls style="display:none;"></video>
        
        <div class="contenedor-inferior">
            <button id="btn-escuchar" class="btn-audio" onclick="reproducirFrase()">🔊 ESCUCHAR FRASE</button>
            <div id="texto-frase-escrita"></div>
            
            <div id="seccion-pistas">
                <div id="texto-pista"></div>
                <div class="controles-pistas">
                    <button class="btn-nav-pista" id="btn-atras" onclick="cambiarPista(-1)">&laquo; ATR&Aacute;S</button>
                    <button class="btn-nav-pista" id="btn-adelante" onclick="cambiarPista(1)">SIGUIENTE &raquo;</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="reproductor-frase"></audio>
    <audio id="sonido-dado" src="dado.mp3"></audio>
