<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Panelista</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Super Sunkissed';
            src: url('Super Sunkissed.ttf');
        }

        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; }
        
        body { 
            font-family: 'Super Sunkissed', sans-serif; 
            text-align: center; color: white; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('back.jpg') no-repeat;
            background-size: cover; background-position: 95% center; background-attachment: fixed;
        }

        /* --- PANTALLA DE INICIO (ALTA Y BOTÓN CHICO) --- */
        #pantalla-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a url('back.jpg') no-repeat center/cover;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            z-index: 9999; padding-top: 3vh;
        }
        .logo-portada { max-width: 220px; width: 65%; margin-bottom: 10px; animation: latido 2s infinite; }
        @keyframes latido { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .btn-entrar { font-family: 'Super Sunkissed', sans-serif; background: #e11d48; color: white; border: 2px solid white; padding: 5px 20px; font-size: 28px; cursor: pointer; border-radius: 50px; text-transform: uppercase; }

        /* --- MENU PRINCIPAL --- */
        #menu-principal { display: none; padding: 20px; transition: opacity 0.5s ease; }
        #menu-principal.atenuado { opacity: 0.15; }
        .header-logo { max-width: 260px; width: 75%; margin: 40px auto 20px auto; display: block; }
        .tablero { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 400px; margin: 0 auto 20px auto; }
        button { font-family: 'Super Sunkissed', sans-serif; height: 90px; border-radius: 12px; border: 2px solid white; color: white; font-size: 18px; text-transform: uppercase; cursor: pointer; }
        .btn-rojo { background: #e11d48; } .btn-verde { background: #16a34a; } .btn-amarillo { background: #ca8a04; } .btn-azul { background: #2563eb; }

        /* --- CONTROLES ABAJO --- */
        .seccion-controles-abajo { display: flex; justify-content: center; align-items: flex-end; gap: 65px; margin-top: 25px; }
        .seccion-dado { background: rgba(0,0,0,0.6); border: 2px dashed #ca8a04; border-radius: 15px; padding: 12px; }
        #boton-dado { background: white; color: black; width: 85px; height: 85px; border-radius: 12px; font-size: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer;}
        .btn-especial { background: black; border: 4px solid #facc15; width: 105px; height: 105px; border-radius: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .star-icon { width: 80%; border-radius: 50%; animation: girar 10s linear infinite; }
        @keyframes girar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .label-control { font-size: 22px; font-weight: bold; color: #facc15; margin-top: 10px; text-shadow: 2px 2px 4px black; }

        /* --- PANTALLA CARTA (FONDO back2 BIEN VISIBLE) --- */
        .pantalla-carta { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('back2.jpg') no-repeat center/cover fixed;
            z-index: 5000; flex-direction: column; justify-content: flex-start; align-items: center; padding-top: 20px; 
        }
        .logo-mazo { max-width: 150px; width: 40%; margin-bottom: 20px; }
        #visor { max-width: 98%; max-height: 46vh; border: 3px solid white; border-radius: 10px; box-shadow: 0 10px 30px black; }
        #visor-video { width: 92%; max-height: 60vh; border: 4px solid white; border-radius: 15px; background: black; object-fit: contain; }
        #texto-frase { margin-top: 15px; font-size: 28px; text-shadow: 2px 2px 5px black; padding: 0 15px; font-weight: bold; line-height: 1.1; }

        /* PISTAS CENTRADAS */
        #pistas-bloque { display: none; width: 90%; margin-top: 15px; flex-direction: column; align-items: center; }
        #txt-pista { color: #facc15; font-size: 28px; margin-bottom: 20px; min-height: 60px; text-shadow: 2px 2px 5px black; }
        .controles-pistas { display: flex; gap: 15px; width: 90%; justify-content: center; }
        .btn-pista { font-family: 'Super Sunkissed', sans-serif; height: 65px !important; border: 2px solid white; border-radius: 12px; color: white; font-size: 22px; padding: 0 20px; min-width: 140px; cursor: pointer; }

        /* BOTÓN VOLVER (LIMPIO Y ARRIBA) */
        .volver-pie-contenedor { 
            margin-top: auto; margin-bottom: 12vh; cursor: pointer; 
            background: rgba(0, 0, 0, 0.7); border: 2px solid white; padding: 8px 40px; border-radius: 25px; 
            animation: deslizar 2s infinite ease-in-out; 
        }
        .volver-pie-texto { font-size: 22px; color: white; text-transform: uppercase; font-weight: bold; }
        @keyframes deslizar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(8px); } }

        /* VF Y RELOJ */
        #contenedor-timer { display: none; width: 140px; height: 140px; border-radius: 50%; border: 6px double #333; background: #fdf5e6; color: #222; justify-content: center; align-items: center; font-family: 'Anton', sans-serif; font-size: 75px; margin: 0 auto 15px auto; }
        .timer-temblor { animation: temblar 0.1s infinite !important; }
        @keyframes temblar { 0% { transform: translate(2px, 1px) rotate(1deg); } 50% { transform: translate(-2px, -1px) rotate(-1deg); } }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <img src="logo.png" class="logo-portada">
        <button class="btn-entrar" onclick="entrarAlJuego()">JUGAR</button>
    </div>

    <div id="menu-principal">
        <img src="logo.png" class="header-logo">
        <div class="tablero">
            <button class="btn-rojo" onclick="abrirMazo('personajes')">¿QUI&Eacute;NES SON?</button>
            <button class="btn-verde" onclick="abrirMazo('quien_dijo')">QUI&Eacute;N DIJO...</button>
            <button class="btn-azul" onclick="abrirMazo('vf')">VERDADERO O FALSO</button>
            <button class="btn-amarillo" onclick="sonarClick()">CHISMES</button>
        </div>
        <div class="seccion-controles-abajo">
            <div style="text-align: center;"><div class="seccion-dado"><div id="boton-dado" onclick="tirarDado()">🎲</div></div><div class="label-control">DADO</div></div>
            <div onclick="abrirVideoAleatorio()" style="text-align: center;"><button class="btn-especial"><img src="star.jpg" class="star-icon"></button><div class="label-control">PANELISTA</div></div>
        </div>
    </div>

    <div id="area-carta" class="pantalla-carta">
        <img src="logo.png" class="logo-mazo">
        <div id="mensaje-fin-videos" style="display:none; font-size:28px; color:gold;">YA NO HAY MÁS...</div>
        <img id="visor" style="display:none;">
        <video id="visor-video" controls style="display:none; width:92%; border-radius:15px;"></video>
        <div id="texto-frase"></div>

        <div id="mazo-vf" style="display:none; width:90%; flex-direction:column; gap:15px;">
            <div id="contenedor-timer">10</div>
            <button id="btn-v" style="height:70px; background:#16a34a; border:3px solid white; border-radius:15px; font-size:24px; color:white;" onclick="chequearVF(true)">VERDADERO</button>
            <button id="btn-f" style="height:70px; background:#e11d48; border:3px solid white; border-radius:15px; font-size:24px; color:white;" onclick="chequearVF(false)">FALSO</button>
            <div id="resp-vf-texto" style="color:#facc15; font-size:24px; margin-top:10px; font-weight:bold;"></div>
        </div>

        <div id="pistas-bloque">
            <div id="txt-pista"></div>
            <div class="controles-pistas">
                <button id="btn-pista-prev" class="btn-pista" style="background:#e11d48;" onclick="cambiarPista(-1)">ANTERIOR</button>
                <button id="btn-pista-next" class="btn-pista" style="background:#2563eb;" onclick="cambiarPista(1)">SIGUIENTE</button>
            </div>
        </div>

        <button id="btn-audio" style="display:none; font-family:'Super Sunkissed'; background:#facc15; color:black; width:90%; height:75px; margin-top:20px; border:3px solid white; border-radius:15px; font-size:24px;" onclick="sonar()">🔊 ESCUCHAR AUDIO</button>

        <div class="volver-pie-contenedor" onclick="cerrar()">
            <div class="volver-pie-texto">VOLVER</div>
        </div>
    </div>

    <audio id="repro-frase"></audio>
    <audio id="repro-dado" src="sonidos/dado.mp3"></audio>
    <audio id="repro-rojo" src="sonidos/moria_01.mp3"></audio>
    <audio id="repro-click" src="sonidos/click.mp3"></audio>
    <audio id="repro-bien" src="sonidos/bien.mp3"></audio>
    <audio id="repro-mal" src="sonidos/mal.mp3"></audio>
    <audio id="repro-tictac" src="sonidos/tictac.mp3" loop></audio>

    <script>
        const datos = {
            personajes: [{ id: 'marley', img: 'personajes/marley.jpg', pistas: ["Su verdadero nombre es Alejandro.", "Empezó como columnista en un magazine.", "Viajó por todo el mundo.", "Tiene un hijo llamado Mirko."] }],
            quien_dijo: [
                { id: 'mirtha_1', img: 'personajes/mirtha.jpg', audios: [{f:'sonidos/mirtha_01.mp3', t:'“Esa técnica de mierda, ese tipo que me arruinó un año de trabajo”'}] },
                { id: 'mirtha_2', img: 'personajes/mirtha.jpg', audios: [{f:'sonidos/mirtha_02.mp3', t:'“Demasiado esfuerzo hago, carajo, mierda”'}] },
                { id: 'mirtha_3', img: 'personajes/mirtha.jpg', audios: [{f:'sonidos/mirtha_03.mp3', t:'“Como te ven te tratan, si te ven mal te maltratan...”'}] },
                { id: 'mirtha_4', img: 'personajes/mirtha.jpg', audios: [{f:'sonidos/mirtha_04.mp3', t:'“Yo no necesito de vos para tener rating Silvana Suarez”'}] },
                { id: 'mirtha_5', img: 'personajes/mirtha.jpg', audios: [{f:'sonidos/mirtha_05.mp3', t:'“¡Así NO!”'}] },
                { id: 'mirtha_6', img: 'personajes/mirtha.jpg', audios: [{f:'sonidos/mirtha_06.mp3', t:'“¿Quién te operó?... La carita, ¿quién te hizo la carita?”'}] },
                { id: 'monti_1', img: 'personajes/monti.jpg', audios: [{f:'sonidos/monti_01.mp3', t:'“¡Ladrones... Sátrapas... Sinvergüenzas!”'}] },
                { id: 'monti_2', img: 'personajes/monti.jpg', audios: [{f:'sonidos/monti_02.mp3', t:'“Passarella... ¡Renunciá!”'}] },
                { id: 'albinoni_1', img: 'personajes/albinoni.jpg', audios: [{f:'sonidos/albinoni_01.mp3', t:'“¡Perdón... pero tengo las bolas llenas!”'}] },
                { id: 'albinoni_2', img: 'personajes/albinoni.jpg', audios: [{f:'sonidos/albinoni_02.mp3', t:'“Perdón... si alguno se ofendió porque después empiezan las ofensa”'}] },
                { id: 'giordano_1', img: 'personajes/giordano.jpg', audios: [{f:'sonidos/giordano_01.mp3', t:'“¡Qué noche Teté!”'}] },
                { id: 'giordano_2', img: 'personajes/giordano.jpg', audios: [{f:'sonidos/giordano_02.mp3', t:'“¡No me peguen!... ¡No me peguen soy...!”'}] },
                { id: 'giordano_3', img: 'personajes/giordano.jpg', audios: [{f:'sonidos/giordano_03.mp3', t:'“Qué mala leche vos eh”'}] },
                { id: 'moria_1', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_01.mp3', t:'“¿¡Quiénes son!? ¡¿Quiénes SON?!”'}] },
                { id: 'moria_2', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_02.mp3', t:'“¡25...25...!”'}] },
                { id: 'moria_3', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_03.mp3', t:'“¡Saca, saca, saca a esta ridícula!”'}] },
                { id: 'moria_4', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_04.mp3', t:'“Son dos doñas berretas de peluquería de barrio”'}] },
                { id: 'moria_5', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_05.mp3', t:'“Entonces no mientas Silvina Escupidero”'}] },
                { id: 'moria_6', img: 'personajes/moria.jpg', audios: [{f:'sonidos/moria_06.mp3', t:'“Y tengo harem, mucho chongo como nunca”'}] },
                { id: 'fort_1', img: 'personajes/fort.jpg', audios: [{f:'sonidos/fort_01.mp3', t:'“¡Mamá, cortaste toda la luz!”'}] },
                { id: 'fort_2', img: 'personajes/fort.jpg', audios: [{f:'sonidos/fort_02.mp3', t:'“¡Maiameeee!”'}] },
                { id: 'fort_3', img: 'personajes/fort.jpg', audios: [{f:'sonidos/fort_03.mp3', t:'“Basta chicos”'}] },
                { id: 'fort_4', img: 'personajes/fort.jpg', audios: [{f:'sonidos/fort_04.mp3', t:'“Por favor... yo no manejo rating, yo manejo Roll Royce”'}] },
                { id: 'dutra', img: 'personajes/dutra.jpg', audios: [{f:'sonidos/dutra_01.mp3', t:'“¡Toy tan sorpresa como todos ustedes!”'}] },
                { id: 'farinia', img: 'personajes/farinia.jpg', audios: [{f:'sonidos/farinia_01.mp3', t:'“¿Querían ficción? Yo les di ficción.”'}] },
                { id: 'feiman', img: 'personajes/feiman.jpg', audios: [{f:'sonidos/feiman_01.mp3', t:'“Y sos tan chicanero... pero mal.”'}] },
                { id: 'flordelav', img: 'personajes/flordelav.jpg', audios: [{f:'sonidos/flordelav_01.mp3', t:'“¡Soltame... Ventura y que dé la cara!”'}] },
                { id: 'ivo', img: 'personajes/ivo.jpg', audios: [{f:'sonidos/ivo_01.mp3', t:'“Dos más dos son cuatro... corta la bocha.”'}] },
                { id: 'jacobo', img: 'personajes/jacobo.jpg', audios: [{f:'sonidos/jacobo_01.mp3', t:'“Billetera... ¡mata galán!”'}] },
                { id: 'listorti', img: 'personajes/listorti.jpg', audios: [{f:'sonidos/listorti_01.mp3', t:'“¡Soooopaaaaaa!”'}] },
                { id: 'paleo', img: 'personajes/paleo.jpg', audios: [{f:'sonidos/paleo_01.mp3', t:'“Ay perdón porque escucho con... deleite.”'}] },
                { id: 'charlotte', img: 'personajes/charlotte.jpg', audios: [{f:'sonidos/charlotte_01.mp3', t:'“¡A mí me gusta el shampein!”'}] },
                { id: 'basile', img: 'personajes/basile.jpg', audios: [{f:'sonidos/basile_01.mp3', t:'“¡Qué boludo, mamita querida!”'}] },
                { id: 'bambino', img: 'personajes/bambino.jpg', audios: [{f:'sonidos/bambino_01.mp3', t:'“¡Es una tormenta de facha!”'}] },
                { id: 'francella', img: 'personajes/francella.jpg', audios: [{f:'sonidos/francella_01.mp3', t:'“¡A comeeerlaaa!”'}] },
                { id: 'riverito', img: 'personajes/riverito.jpg', audios: [{f:'sonidos/riverito_01.mp3', t:'“¡A cruzar los dedos!”'}] },
                { id: 'barbieri', img: 'personajes/barbieri.jpg', audios: [{f:'sonidos/barbieri01.mp3', t:'“¿Me estás retando?”'}] },
                { id: 'pachano', img: 'personajes/pachano.jpg', audios: [{f:'sonidos/pachano01.mp3', t:'“¡Tinguitingui tinguitingui!”'}] },
                { id: 'fantino', img: 'personajes/fantino.jpg', audios: [{f:'sonidos/fantino_01.mp3', t:'“¡Para un poco Mose Paraaaa!!”'}] }
            ],
            vf: [
                { t: 'Marcela Tauro fue abducida por un OVNI', r: true, detalle: 'Aseguró que fue en Ranelagh.' },
                { t: 'El perro de Susana Jiménez se llamaba Bruno', r: false, detalle: 'Se llamaba Jazmín.' },
                { t: 'En el primer almuerzo de Mirtha estuvo Daniel Tinayre', r: true, detalle: 'Debutó el 3 de junio de 1968.' }
            ]
        };
        
        let mazoVerde = []; let mazoAzul = [];
        let videosDisponibles = ['panelistas/pane01.mp4', 'panelistas/pane02.mp4'];
        let actual = null; let pIdx = 0; let respondidoVF = false; let timerSegundos = 10; let intervaloTimer = null;

        function entrarAlJuego() {
            const docElm = document.documentElement;
            if (docElm.requestFullscreen) docElm.requestFullscreen();
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';
        }

        function abrirMazo(t) {
            pararTimer(); sonarClick();
            document.getElementById('menu-principal').classList.add('atenuado');
            document.getElementById('area-carta').style.display = 'flex';
            document.getElementById('visor').style.display = 'none';
            document.getElementById('visor-video').style.display = 'none';
            document.getElementById('mazo-vf').style.display = 'none';
            document.getElementById('pistas-bloque').style.display = 'none';
            document.getElementById('btn-audio').style.display = 'none';
            document.getElementById('mensaje-fin-videos').style.display = 'none';
            document.getElementById('texto-frase').innerHTML = "";

            if (t === 'personajes') {
                document.getElementById('repro-rojo').play();
                actual = datos.personajes[Math.floor(Math.random() * datos.personajes.length)];
                document.getElementById('visor').src = actual.img;
                document.getElementById('visor').style.display = 'block';
                pIdx = 0; document.getElementById('pistas-bloque').style.display = 'flex';
                document.getElementById('txt-pista').innerHTML = actual.pistas[pIdx];
                actualizarBotonesPistas();
            } else if (t === 'vf') {
                document.getElementById('btn-v').style.opacity = "1";
                document.getElementById('btn-f').style.opacity = "1";
                if (mazoAzul.length === 0) mazoAzul = [...datos.vf].sort(() => Math.random() - 0.5);
                actual = mazoAzul.pop();
                document.getElementById('texto-frase').innerHTML = actual.t;
                document.getElementById('mazo-vf').style.display = 'flex';
                respondidoVF = false; iniciarTimer();
            } else if (t === 'quien_dijo') {
                if (mazoVerde.length === 0) mazoVerde = [...datos.quien_dijo].sort(() => Math.random() - 0.5);
                actual = mazoVerde.pop();
                document.getElementById('visor').src = actual.img;
                document.getElementById('visor').style.display = 'block';
                document.getElementById('btn-audio').style.display = 'block';
                document.getElementById('texto-frase').innerHTML = actual.audios[0].t;
            }
        }

        function abrirVideoAleatorio() {
            sonarClick(); document.getElementById('menu-principal').classList.add('atenuado');
            document.getElementById('area-carta').style.display = 'flex';
            document.getElementById('visor').style.display = 'none';
            document.getElementById('mazo-vf').style.display = 'none';
            document.getElementById('pistas-bloque').style.display = 'none';
            document.getElementById('btn-audio').style.display = 'none';
            const v = document.getElementById('visor-video');
            if(videosDisponibles.length === 0) { document.getElementById('mensaje-fin-videos').style.display = 'block'; }
            else { 
                const ve = videosDisponibles.splice(Math.floor(Math.random()*videosDisponibles.length), 1)[0];
                v.src = ve; v.style.display = 'block'; v.play();
            }
        }

        function actualizarBotonesPistas() {
            const btnPrev = document.getElementById('btn-pista-prev');
            const btnNext = document.getElementById('btn-pista-next');
            btnPrev.style.display = (pIdx > 0) ? 'block' : 'none';
            btnNext.style.display = (pIdx < actual.pistas.length - 1) ? 'block' : 'none';
        }

        function cambiarPista(d) { pIdx += d; document.getElementById('txt-pista').innerHTML = actual.pistas[pIdx]; actualizarBotonesPistas(); sonarClick(); }

        function iniciarTimer() {
            timerSegundos = 10;
            const cajaTimer = document.getElementById('contenedor-timer');
            cajaTimer.innerText = timerSegundos; cajaTimer.style.display = 'flex';
            cajaTimer.classList.remove('timer-temblor');
            document.getElementById('repro-tictac').play();
            intervaloTimer = setInterval(() => {
                timerSegundos--; cajaTimer.innerText = timerSegundos;
                if(timerSegundos <= 0) { pararTimer(); cajaTimer.classList.add('timer-temblor'); if(!respondidoVF) chequearVF('tiempo'); }
            }, 1000);
        }

        function pararTimer() { clearInterval(intervaloTimer); document.getElementById('repro-tictac').pause(); }

        function chequearVF(eleccion) {
            if(respondidoVF) return; respondidoVF = true; pararTimer();
            if(eleccion === actual.r) document.getElementById('repro-bien').play(); else document.getElementById('repro-mal').play();
            document.getElementById('resp-vf-texto').innerHTML = actual.detalle;
            document.getElementById('btn-v').style.opacity = (eleccion === true) ? "1" : "0.3";
            document.getElementById('btn-f').style.opacity = (eleccion === false) ? "1" : "0.3";
        }

        function tirarDado() {
            document.getElementById('repro-dado').play();
            let c = 0; let i = setInterval(() => {
                document.getElementById('boton-dado').innerText = Math.floor(Math.random()*6)+1;
                if(c++ > 10) clearInterval(i);
            }, 80);
        }

        function cerrar() { pararTimer(); document.getElementById('menu-principal').classList.remove('atenuado'); document.getElementById('area-carta').style.display = 'none'; document.getElementById('visor-video').pause(); }
        function sonarClick() { document.getElementById('repro-click').play(); }
        function sonar() { document.getElementById('repro-frase').src = actual.audios[0].f; document.getElementById('repro-frase').play(); }
    </script>
</body>
</html>
