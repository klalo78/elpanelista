<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Panelista</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        /* Estilos base */
        body { 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; margin: 0; padding: 20px; color: white; 
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('back.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden; /* Evita scrolls raros en pantalla completa */
        }

        /* --- PANTALLA DE INICIO --- */
        #pantalla-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a url('back.jpg') center/cover no-repeat;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .logo-portada {
            max-width: 300px; width: 80%; margin-bottom: 40px;
            filter: drop-shadow(0 0 15px rgba(250, 204, 21, 0.5));
        }

        .btn-entrar {
            background: #facc15; color: black; border: 4px solid white;
            padding: 20px 50px; font-size: 22px; font-weight: 900;
            border-radius: 50px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* --- MENU Y MAZOS (Ocultos al inicio) --- */
        #menu-principal, .pantalla-carta { display: none; }

        .header-logo { max-width: 180px; width: 50%; margin: 10px auto 20px; }
        .tablero { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 400px; margin: 0 auto; }
        
        /* Botones de colores */
        button { font-family: 'Montserrat', sans-serif; height: 90px; border-radius: 12px; border: 2px solid white; font-weight: 900; color: white; font-size: 13px; cursor: pointer; text-transform: uppercase; }
        .btn-rojo { background: #e11d48; } .btn-verde { background: #16a34a; } .btn-amarillo { background: #ca8a04; } .btn-azul { background: #2563eb; }

        /* Contenedores de Cartas */
        .pantalla-carta { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 500;
            flex-direction: column; justify-content: center; align-items: center; 
        }
        #visor, #visor-video { max-width: 85%; max-height: 45vh; border: 4px solid white; border-radius: 15px; }

        /* Dado y Panelista abajo */
        .controles-inferiores { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 20px; }
        .caja-dado { background: rgba(0,0,0,0.5); border: 2px dashed #facc15; border-radius: 15px; padding: 10px; }
        #boton-dado { background: white; color: black; width: 55px; height: 55px; border-radius: 10px; font-size: 28px; display: flex; justify-content: center; align-items: center; margin: 5px auto; }
        .btn-estrella { background: black; color: #facc15; border: 2px solid #facc15; width: 70px; height: 70px; border-radius: 15px; font-size: 35px; }

        .btn-cerrar { position: absolute; top: 20px; right: 20px; background: #e11d48; border-radius: 50%; width: 45px; height: 45px; color: white; font-weight: bold; border: 2px solid white; }
    </style>
</head>
<body>

    <div id="pantalla-inicio">
        <img src="logo.jpg" class="logo-portada">
        <button class="btn-entrar" onclick="iniciarTodo()">ENTRAR AL JUEGO</button>
    </div>

    <div id="menu-principal">
        <img src="logo.jpg" class="header-logo">
        <div class="tablero">
            <button class="btn-rojo" onclick="abrirMazo('personajes')">ADIVIN&Aacute; EL PERSONAJE</button>
            <button class="btn-verde" onclick="abrirMazo('quien_dijo')">QUI&Eacute;N DIJO</button>
            <button class="btn-azul" onclick="alert('Pr&oacute;ximamente')">POR LO MENOS TRES</button>
            <button class="btn-amarillo" onclick="alert('Pr&oacute;ximamente')">CHISMES</button>
        </div>
        <div class="controles-inferiores">
            <div class="caja-dado">
                <div id="boton-dado" onclick="tirarDado()">🎲</div>
            </div>
            <div onclick="abrirVideoAleatorio()">
                <button class="btn-estrella">★</button>
                <div style="font-size: 10px; color:#facc15; margin-top:5px; font-weight:bold;">PANELISTA</div>
            </div>
        </div>
    </div>

    <div id="area-carta" class="pantalla-carta">
        <button class="btn-cerrar" onclick="cerrar()">X</button>
        <img id="visor" style="display:none;">
        <video id="visor-video" controls style="display:none;"></video>
        <div id="pistas-cont" style="margin-top:20px; width:80%;">
            <div id="txt-pista" style="font-size:18px; color:#facc15; margin-bottom:15px; font-weight:bold;"></div>
            <button id="btn-sig" style="width:100%; background:#2563eb; height:50px !important;" onclick="sigPista()">SIGUIENTE</button>
        </div>
        <button id="btn-audio" style="display:none; background:#facc15; color:black; width:80%; height:60px !important; margin-top:15px;" onclick="oir()">🔊 ESCUCHAR</button>
        <div id="frase-txt" style="margin-top:10px; font-style:italic; font-size:20px;"></div>
    </div>

    <audio id="repro-frase"></audio>
    <audio id="sonido-dado" src="dado.mp3"></audio>

    <script>
        // LÓGICA DE PANTALLA COMPLETA
        function iniciarTodo() {
            // 1. Ocultar portada y mostrar juego
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';

            // 2. Activar Pantalla Completa
            let e = document.documentElement;
            if (e.requestFullscreen) e.requestFullscreen();
            else if (e.webkitRequestFullscreen) e.webkitRequestFullscreen();
            else if (e.msRequestFullscreen) e.msRequestFullscreen();
        }

        // MAZOS
        const mazos = {
            personajes: [{img:'personajes/p_01marley.jpg', pistas:["Es Alejandro.","Viajero.","Papá de Mirko."]}],
            quien_dijo: [{img:'personajes/p_06fort.jpg', audios:[{f:'sonidos/p_06fort_01.mp3', t:'“¡Cortaste toda la luz!”'}]}]
        };
        let vids = ['panelistas/pane01.mp4'];
        let actual = null; let idx = 0;

        function abrirMazo(t) {
            actual = mazos[t][0]; // Por ahora el primero
            document.getElementById('visor').src = actual.img;
            document.getElementById('visor').style.display = 'block';
            document.getElementById('visor-video').style.display = 'none';
            document.getElementById('frase-txt').innerHTML = "";

            if(t === 'quien_dijo') {
                document.getElementById('pistas-cont').style.display = 'none';
                document.getElementById('btn-audio').style.display = 'block';
            } else {
                idx = 0;
                document.getElementById('pistas-cont').style.display = 'block';
                document.getElementById('btn-audio').style.display = 'none';
                document.getElementById('txt-pista').innerHTML = actual.pistas[idx];
            }
            document.getElementById('area-carta').style.display = 'flex';
        }

        function sigPista() {
            if(idx < actual.pistas.length - 1) {
                idx++;
                document.getElementById('txt-pista').innerHTML = actual.pistas[idx];
            }
        }

        function oir() {
            const r = document.getElementById('repro-frase');
            r.src = actual.audios[0].f;
            document.getElementById('frase-txt').innerHTML = actual.audios[0].t;
            r.play();
        }

        function abrirVideoAleatorio() {
            if(vids.length === 0) return alert("Fin");
            const v = document.getElementById('visor-video');
            v.src = vids[0];
            document.getElementById('visor').style.display = 'none';
            document.getElementById('visor-video').style.display = 'block';
            document.getElementById('pistas-cont').style.display = 'none';
            document.getElementById('btn-audio').style.display = 'none';
            document.getElementById('area-carta').style.display = 'flex';
            v.play();
        }

        function tirarDado() {
            const d = document.getElementById('boton-dado');
            let c = 0;
            let i = setInterval(() => {
                d.innerText = Math.floor(Math.random()*6)+1;
                if(c++ > 10) clearInterval(i);
            }, 80);
        }

        function cerrar() {
            document.getElementById('repro-frase').pause();
            document.getElementById('visor-video').pause();
            document.getElementById('area-carta').style.display = 'none';
        }
    </script>
</body>
</html>
