<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Panelista</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            text-align: center; margin: 0; padding: 0; color: white; 
            background-color: #1a1a1a;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('back.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            overflow: hidden;
            transition: background-image 0.4s ease-in-out;
        }

        body.fondo-mazo {
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('back2.jpg');
        }

        /* --- PANTALLA DE INICIO --- */
        #pantalla-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #1a1a1a url('back.jpg') no-repeat center 20%/cover;
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            z-index: 9999; padding-top: 8vh; 
        }

        .logo-portada { max-width: 220px; width: 65%; margin-bottom: 15px; filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.5)); animation: latido 2s infinite; }
        @keyframes latido { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .btn-entrar {
            background-color: rgba(225, 29, 72, 0.7); color: white; border: 2px solid white;
            padding: 10px 30px; font-size: 16px; font-weight: 900; border-radius: 50px; cursor: pointer;
            text-transform: uppercase; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.6); margin-top: -25px; 
            text-shadow: 1px 1px 3px black;
        }

        /* --- MENÚ PRINCIPAL --- */
        #menu-principal { display: none; padding: 20px; }
        .header-logo { max-width: 260px; width: 75%; margin: 5px auto 20px auto; display: block; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.5)); animation: latido 2s infinite; }

        .tablero { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; max-width: 380px; margin: 0 auto 20px auto; }
        button { font-family: 'Montserrat', sans-serif; height: 85px; border-radius: 12px; border: 2px solid white; font-weight: 900; color: white; font-size: 13px; text-transform: uppercase; cursor: pointer; }
        .btn-rojo { background: #e11d48; } .btn-verde { background: #16a34a; } .btn-amarillo { background: #ca8a04; } .btn-azul { background: #2563eb; }

        /* CONTROLES INFERIORES */
        .seccion-controles-abajo { display: flex; justify-content: center; align-items: center; gap: 25px; margin-top: 15px; }
        .seccion-dado { background: rgba(0,0,0,0.6); border: 2px dashed #ca8a04; border-radius: 15px; padding: 12px; }
        #boton-dado { background: white; color: black; width: 65px; height: 65px; border-radius: 12px; font-size: 35px; display: flex; justify-content: center; align-items: center; margin: 0 auto; }
        .btn-especial { background: black; color: #facc15; border: 4px solid #facc15; width: 85px; height: 85px; border-radius: 20px; font-size: 45px; box-shadow: 0 0 15px rgba(250, 204, 21, 0.5); }

        /* --- PANTALLA CARTA / VIDEO --- */
        .pantalla-carta { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 10000; 
            flex-direction: column; justify-content: flex-start; align-items: center; 
            padding-top: 20px;
        }
        
        /* Logo dentro de los mazos (Arriba) */
        .logo-mazo { max-width: 150px; width: 40%; margin-bottom: 20px; filter: drop-shadow(0 0 5px black); }

        #visor { max-width: 85%; max-height: 40vh; border: 3px solid white; border-radius: 10px; box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        
        #visor-video { 
            width: 85%; 
            max-height: 55vh; 
            border: 4px solid white; 
            border-radius: 15px; 
            background: black; 
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }
        
        .btn-cerrar { position: absolute; top: 20px; right: 20px; background: #e11d48; color: white; border: 2px solid white; border-radius: 50%; width: 50px; height: 50px; font-weight: bold; font-size: 20px; z-index: 10001; }

        .contenedor-inferior-mazo { width: 90%; margin-top: 15px; }
    </style>
</head>
<body id="cuerpo-web">

    <div id="pantalla-inicio">
        <img src="logo.png" alt="Logo" class="logo-portada">
        <button class="btn-entrar" onclick="entrarAlJuego()">Entrar</button>
    </div>

    <div id="menu-principal">
        <img src="logo.png" class="header-logo">
        <div class="tablero">
            <button class="btn-rojo" onclick="abrirMazo('personajes')">ADIVIN&Aacute;</button>
            <button class="btn-verde" onclick="abrirMazo('quien_dijo')">QUI&Eacute;N DIJO</button>
            <button class="btn-azul" onclick="alert('Próximamente')">TRES...</button>
            <button class="btn-amarillo" onclick="alert('Próximamente')">CHISMES</button>
        </div>
        <div class="seccion-controles-abajo">
            <div class="seccion-dado"><div id="boton-dado" onclick="tirarDado()">🎲</div></div>
            <div onclick="abrirVideoAleatorio()" style="text-align: center;">
                <button class="btn-especial">★</button>
                <div style="font-size: 11px; font-weight: bold; color: #facc15; margin-top: 5px; text-transform: uppercase;">PANELISTA</div>
            </div>
        </div>
    </div>

    <div id="area-carta" class="pantalla-carta">
        <button class="btn-cerrar" onclick="cerrar()">X</button>
        
        <img src="logo.png" class="logo-mazo">

        <img id="visor" style="display:none;">
        <video id="visor-video" controls style="display:none;"></video>
        
        <div class="contenedor-inferior-mazo">
            <div id="pistas-bloque" style="display:none;">
                <div id="txt-pista" style="color:#facc15; font-size:18px; font-weight:bold; margin-bottom:15px; min-height:50px; text-shadow: 2px 2px 4px black;"></div>
                <button style="width:100%; background:#2563eb; height:50px !important; border: 2px solid white; border-radius: 10px; color: white; font-weight: 900;" onclick="cambiarPista(1)">SIGUIENTE</button>
            </div>
            
            <button id="btn-audio" style="display:none; background:#facc15; color:black; width:100%; height:60px !important; margin-top:15px; border: 2px solid white; border-radius: 10px; font-weight: 900;" onclick="sonar()">🔊 ESCUCHAR</button>
            <div id="texto-frase" style="margin-top:10px; font-style:italic; font-size:20px; text-shadow: 2px 2px 4px black;"></div>
        </div>
    </div>

    <audio id="repro-frase"></audio>

    <script>
        const datos = {
            personajes: [{img:'personajes/p_01marley.jpg', pistas:["Pista 1: Su verdadero nombre es Alejandro.","Pista 2: Empezó en un magazine.","Pista 3: Viajó por todo el mundo.","Pista 4: Tiene un hijo llamado Mirko."]}],
            quien_dijo: [{img:'personajes/p_06fort.jpg', audios:[{f:'sonidos/p_06fort_01.mp3', t:'“¡Mamá, cortaste toda la luz!”'}]}]
        };
        
        let vids = ['panelistas/pane01.mp4'];
        let actual = null; let pIdx = 0;

        function entrarAlJuego() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';
            let e = document.documentElement;
            if (e.requestFullscreen) e.requestFullscreen();
            else if (e.webkitRequestFullscreen) e.webkitRequestFullscreen();
        }

        function abrirMazo(t) {
            document.getElementById('cuerpo-web').classList.add('fondo-mazo');
            actual = datos[t][Math.floor(Math.random() * datos[t].length)];
            document.getElementById('visor').src = actual.img;
            document.getElementById('visor').style.display = 'block';
            document.getElementById('visor-video').style.display = 'none';
            document.getElementById('texto-frase').innerHTML = "";
            
            if(t === 'quien_dijo') {
                document.getElementById('pistas-bloque').style.display = 'none';
                document.getElementById('btn-audio').style.display = 'block';
            } else {
                pIdx = 0;
                document.getElementById('pistas-bloque').style.display = 'block';
                document.getElementById('btn-audio').style.display = 'none';
                document.getElementById('txt-pista').innerHTML = actual.pistas[pIdx];
            }
            document.getElementById('area-carta').style.display = 'flex';
        }

        function abrirVideoAleatorio() {
            if(vids.length === 0) return alert("Fin de videos");
            document.getElementById('cuerpo-web').classList.add('fondo-mazo');
            const idxAleatorio = Math.floor(Math.random() * vids.length);
            const videoElegido = vids.splice(idxAleatorio, 1)[0]; 

            const vp = document.getElementById('visor-video');
            vp.src = videoElegido;
            
            document.getElementById('visor').style.display = 'none';
            document.getElementById('pistas-bloque').style.display = 'none';
            document.getElementById('btn-audio').style.display = 'none';
            document.getElementById('texto-frase').innerHTML = "";
            
            document.getElementById('visor-video').style.display = 'block';
            document.getElementById('area-carta').style.display = 'flex';
            vp.play();
        }

        function sonar() {
            const r = document.getElementById('repro-frase');
            r.src = actual.audios[0].f;
            document.getElementById('texto-frase').innerHTML = actual.audios[0].t;
            r.play();
        }

        function cambiarPista(d) {
            if(pIdx < actual.pistas.length - 1) {
                pIdx += d;
                document.getElementById('txt-pista').innerHTML = actual.pistas[pIdx];
            }
        }

        function tirarDado() {
            const d = document.getElementById('boton-dado');
            let c = 0;
            let i = setInterval(() => {
                d.innerText = Math.floor(Math.random()*6)+1;
                if(c++ > 10) clearInterval(i);
            }, 80);
        }

        function cerrar() {
            document.getElementById('cuerpo-web').classList.remove('fondo-mazo');
            document.getElementById('repro-frase').pause();
            const vp = document.getElementById('visor-video');
            vp.pause();
            vp.src = ""; 
            document.getElementById('area-carta').style.display = 'none';
            document.getElementById('menu-principal').style.display = 'block';
        }
    </script>
</body>
</html>
